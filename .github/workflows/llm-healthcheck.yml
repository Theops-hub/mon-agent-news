name: LLM Health Check

# Vérification hebdomadaire que chaque provider LLM répond encore.
# Le fallback de llm.ts masque les pannes individuelles : ce check détecte les
# clés mortes / quotas / modèles dépréciés avant que toute la chaîne ne tombe.
# En cas d'échec, notify-failure ouvre une issue → email GitHub natif.

on:
  schedule:
    # Tous les lundis à 06:11 UTC
    - cron: "11 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check LLM providers
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run llm-health

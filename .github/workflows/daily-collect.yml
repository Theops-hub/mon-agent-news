name: Daily News Collection

on:
  schedule:
    # Tous les jours à 07:00 UTC (08:00/09:00 Paris selon DST)
    - cron: "0 7 * * *"
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

permissions:
  contents: write # nécessaire pour committer les articles

jobs:
  collect:
    runs-on: ubuntu-latest
    # Filet de sécurité absolu : aucun run ne peut consommer plus de 15 min
    # (le 10 mai 2026 un run avait tourné 6h05 et vidé le quota Actions).
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run collection
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run collect

      - name: Commit results
        run: |
          git config user.name "news-agent-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/articles/
          if git diff --staged --quiet; then
            echo "Aucun nouvel article à committer."
            exit 0
          fi
          git commit -m "📰 Articles du $(date +%Y-%m-%d)"
          # Retry avec rebase si un autre push est arrivé entre-temps
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push échoué (tentative $i), retry..."
            sleep 3
          done
          exit 1

name: Daily News Collection

on:
  schedule:
    # Collecte principale à 03:37 UTC (05:37/04:37 Paris selon DST), assez tôt
    # pour que le digest du matin (~05:07 UTC) parte avec les articles du jour.
    # Minute décalée : les crons "pile" sont les plus retardés par GitHub.
    - cron: "37 3 * * *"
    # Cron de rattrapage : ne fait rien si la collecte du jour a déjà réussi
    # (voir le step "guard"). Couvre les crons sautés/très retardés par GitHub.
    - cron: "37 10 * * *"
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

permissions:
  contents: write # nécessaire pour committer les articles

jobs:
  collect:
    runs-on: ubuntu-latest
    # Filet de sécurité absolu contre les runs fous (le 10 mai 2026 un run
    # avait tourné 6h05 et vidé le quota Actions). Le travail réel prend ~6 min ;
    # 20 min laissent de la marge pour les jours de forte actualité, depuis que
    # collect.ts se termine par un process.exit explicite (fix du 11 juin 2026).
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      # Garde du cron de rattrapage : si les articles du jour sont déjà dans le
      # repo, la collecte planifiée a réussi et on sort sans rien faire.
      # Les lancements manuels (workflow_dispatch) s'exécutent toujours.
      - name: Guard — collecte du jour déjà faite ?
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ -f "data/articles/$(date +%Y-%m-%d).json" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Articles du jour déjà collectés — run de rattrapage inutile."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v5
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm ci

      - name: Typecheck
        if: steps.guard.outputs.skip != 'true'
        run: npm run typecheck

      - name: Run collection
        if: steps.guard.outputs.skip != 'true'
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run collect

      - name: Commit results
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "news-agent-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/articles/
          if git diff --staged --quiet; then
            echo "Aucun nouvel article à committer."
            exit 0
          fi
          git commit -m "📰 Articles du $(date +%Y-%m-%d)"
          # Retry avec rebase si un autre push est arrivé entre-temps
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push échoué (tentative $i), retry..."
            sleep 3
          done
          exit 1

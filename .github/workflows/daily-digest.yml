name: Daily Digest

on:
  schedule:
    # Tous les jours à 18:00 UTC (19:00/20:00 Paris)
    # La déduplication par URL côté digest.ts garantit qu'aucun article n'est envoyé deux fois.
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate and send digest
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: npm run digest

      - name: Commit digest
        run: |
          git config user.name "news-agent-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/digests/ data/sent.json
          if git diff --staged --quiet; then
            echo "Aucun digest à committer."
            exit 0
          fi
          git commit -m "📊 Digest $(date +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push échoué (tentative $i), retry..."
            sleep 3
          done
          exit 1

name: Daily Digest

on:
  schedule:
    # Envoi du matin : 05:07 UTC = 07:07 Paris l'été / 06:07 l'hiver.
    # GitHub retarde les crons de 30 min à 2 h en pratique → réception ~8h.
    # La collecte tourne à 03:37 UTC pour que les articles du jour soient prêts.
    - cron: "7 5 * * *"
    # Passage de rattrapage 3 h plus tard : si l'envoi du matin a réussi, tous
    # les articles sont dans sent.json → "aucun article nouveau", pas d'email.
    # S'il a raté (cron sauté, panne ponctuelle), celui-ci prend le relais.
    # La déduplication par URL garantit qu'aucun article n'est envoyé deux fois.
    - cron: "7 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Generate and send digest
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: npm run digest

      - name: Commit digest
        run: |
          git config user.name "news-agent-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/digests/ data/sent.json
          if git diff --staged --quiet; then
            echo "Aucun digest à committer."
            exit 0
          fi
          git commit -m "📊 Digest $(date +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push échoué (tentative $i), retry..."
            sleep 3
          done
          exit 1

name: Weekly Digest

on:
  schedule:
    # Tous les dimanches à 18:00 UTC (19:00/20:00 Paris)
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate and send digest
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: npm run digest

      - name: Commit digest
        run: |
          git config user.name "news-agent-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/digests/
          git diff --staged --quiet || git commit -m "📊 Digest hebdo $(date +%Y-%m-%d)"
          git push
